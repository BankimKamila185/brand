version: '3.9'

services:
  # ─────────────────────── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tevar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tevar}
      POSTGRES_USER: ${POSTGRES_USER:-tevar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tevar_pass_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tevar_user} -d ${POSTGRES_DB:-tevar}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tevar_network

  # ─────────────────────── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tevar_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass_change_me} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-redis_pass_change_me}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tevar_network

  # ─────────────────────── Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tevar_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-tevar_user}:${POSTGRES_PASSWORD:-tevar_pass_change_me}@postgres:5432/${POSTGRES_DB:-tevar}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass_change_me}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-Tevar <noreply@tevar.in>}
      FRONTEND_URL: ${FRONTEND_URL:-https://tevar.vercel.app}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    ports:
      - '4000:4000'
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tevar_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tevar_network:
    driver: bridge
