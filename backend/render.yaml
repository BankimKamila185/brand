services:
  - type: web
    name: tevar-backend
    env: node
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          name: tevar-redis
          type: redis
          property: connectionString

  - type: redis
    name: tevar-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
